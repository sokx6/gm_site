# ============================================================
# GM Site 配置文件
# 复制此文件为 backend/config.yaml 并修改为实际配置
# 敏感字段可改用环境变量覆盖（参见 .env.example）
# ============================================================

server:
  # 服务器监听端口
  port: 1324
  # 服务器监听地址（0.0.0.0 监听所有网络接口）
  host: "0.0.0.0"

database:
  # SQLite 数据库文件路径（相对于工作目录）
  path: "gm_site_syk91.db"

jwt:
  # JWT Access Token 密钥（必须 ≥ 32 位随机字符，生产环境请更换）
  access_secret: "your-access-secret-change-in-production-32chars"
  # JWT Refresh Token 密钥（必须 ≥ 32 位随机字符，与 access_secret 不同）
  refresh_secret: "your-refresh-secret-change-in-production-32chars"
  # Access Token 过期时间（格式: 数字+单位，支持 s/m/h）
  access_expire: "15m"
  # Refresh Token 过期时间（格式: 数字+单位，支持 h）
  refresh_expire: "168h"

smtp:
  # SMTP 服务器地址（163邮箱: smtp.163.com）
  host: "smtp.163.com"
  # SMTP 服务器端口（163邮箱TLS: 587）
  port: 465
  # SMTP 登录用户名（完整邮箱地址）
  username: "lbd1826@163.com"
  # SMTP 登录密码（163邮箱为授权码，非邮箱登录密码）
  # 可通过环境变量 GM_SMTP_PASSWORD 覆盖
  password: "BXaGDi6tijBeD95Z"
  # 发件人地址（通常与 username 相同）
  from: "lbd1826@163.com"
  # 管理员邮箱（接收新用户注册通知）
  admin_email: "2841929072@qq.com"
  # 是否使用 TLS 加密连接
  use_tls: true

lsky:
  # 兰空图床 Base URL（末尾不要带斜杠）
  base_url: "https://image.locxl.site"
  # 兰空图床登录邮箱
  email: "2841929072@qq.com"
  # 兰空图床登录密码
  # 可通过环境变量 GM_LSKY_PASSWORD 覆盖
  password: "Zsh20061210@Image"
  # 兰空图床 Token（留空则程序启动时自动获取）
  token: ""

admin:
  # 管理员邮箱：使用此邮箱注册的用户自动获得管理员权限
  email: "2841929072@qq.com"

site:
  # 站点名称（群友昵称，用于页面展示）
  name: "凯哥"
  # 安全运行起始日期（格式: YYYY-MM-DD，用于计算运行天数）
  start_date: "2026-05-09"

upload:
  # 单张图片上传大小限制（单位: MB）
  max_size_mb: 10

cors:
  # 允许的跨域来源（逗号分隔），留空默认 http://localhost:5173
  # 生产环境请填写前端部署地址，如 https://your-frontend-domain.com
  allowed_origins: "https://syk91.xyz"
